<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            user-select: none;
        }

        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .demo-container {
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            display: inline-block;
        }

        .striped-bg {
            height: 400px;
            width: 700px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            overflow: hidden;
            background: repeating-linear-gradient(
                135deg,
                #D50000,
                #D50000 20px,
                #C51162 20px,
                #C51162 40px,
                #AA00FF 40px,
                #AA00FF 60px,
                #6200EA 60px,
                #6200EA 80px,
                #304FFE 80px,
                #304FFE 100px,
                #2962FF 100px,
                #2962FF 120px,
                #0091EA 120px,
                #0091EA 140px,
                #00B8D4 140px,
                #00B8D4 160px,
                #00BFA5 160px,
                #00BFA5 180px,
                #00C853 180px,
                #00C853 200px,
                #64DD17 200px,
                #64DD17 220px,
                #AEEA00 220px,
                #AEEA00 240px,
                #FFD600 240px,
                #FFD600 260px,
                #FFAB00 260px,
                #FFAB00 280px,
                #FF6D00 280px,
                #FF6D00 300px,
                #DD2C00 300px,
                #DD2C00 320px
            );
            position: relative;
        }

        /* Круг — теперь div, а не img */
        .holey-ball {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            cursor: grab;
            z-index: 10;
            top: 120px;
            left: 280px;
            
            /* Серый цвет круга */
            background-color: #DCDCDC;
            
            /* Дырки создаём через mask с точечным узором */
            mask-image: radial-gradient(circle at 20% 30%, black 2px, transparent 2px),
                        radial-gradient(circle at 50% 70%, black 2px, transparent 2px),
                        radial-gradient(circle at 80% 20%, black 2px, transparent 2px),
                        radial-gradient(circle at 35% 85%, black 2px, transparent 2px),
                        radial-gradient(circle at 65% 45%, black 2px, transparent 2px),
                        radial-gradient(circle at 10% 60%, black 2px, transparent 2px),
                        radial-gradient(circle at 90% 80%, black 2px, transparent 2px),
                        radial-gradient(circle at 45% 15%, black 2px, transparent 2px),
                        radial-gradient(circle at 75% 90%, black 2px, transparent 2px),
                        radial-gradient(circle at 25% 50%, black 2px, transparent 2px),
                        radial-gradient(circle at 55% 25%, black 2px, transparent 2px),
                        radial-gradient(circle at 15% 75%, black 2px, transparent 2px),
                        radial-gradient(circle at 85% 55%, black 2px, transparent 2px),
                        radial-gradient(circle at 40% 40%, black 2px, transparent 2px),
                        radial-gradient(circle at 70% 10%, black 2px, transparent 2px),
                        radial-gradient(circle at 5% 20%, black 2px, transparent 2px),
                        radial-gradient(circle at 95% 40%, black 2px, transparent 2px),
                        radial-gradient(circle at 60% 95%, black 2px, transparent 2px);
            
            mask-size: 30px 30px, 28px 28px, 32px 32px, 26px 26px, 34px 34px,
                       29px 29px, 31px 31px, 27px 27px, 33px 33px, 30px 30px,
                       28px 28px, 32px 32px, 26px 26px, 35px 35px, 29px 29px,
                       30px 30px, 28px 28px, 31px 31px;
            
            mask-repeat: repeat, repeat, repeat, repeat, repeat,
                         repeat, repeat, repeat, repeat, repeat,
                         repeat, repeat, repeat, repeat, repeat,
                         repeat, repeat, repeat;
            
            mask-composite: exclude;
            -webkit-mask-image: radial-gradient(circle at 20% 30%, black 2px, transparent 2px),
                                radial-gradient(circle at 50% 70%, black 2px, transparent 2px),
                                radial-gradient(circle at 80% 20%, black 2px, transparent 2px),
                                radial-gradient(circle at 35% 85%, black 2px, transparent 2px),
                                radial-gradient(circle at 65% 45%, black 2px, transparent 2px),
                                radial-gradient(circle at 10% 60%, black 2px, transparent 2px),
                                radial-gradient(circle at 90% 80%, black 2px, transparent 2px),
                                radial-gradient(circle at 45% 15%, black 2px, transparent 2px),
                                radial-gradient(circle at 75% 90%, black 2px, transparent 2px),
                                radial-gradient(circle at 25% 50%, black 2px, transparent 2px),
                                radial-gradient(circle at 55% 25%, black 2px, transparent 2px),
                                radial-gradient(circle at 15% 75%, black 2px, transparent 2px),
                                radial-gradient(circle at 85% 55%, black 2px, transparent 2px),
                                radial-gradient(circle at 40% 40%, black 2px, transparent 2px),
                                radial-gradient(circle at 70% 10%, black 2px, transparent 2px),
                                radial-gradient(circle at 5% 20%, black 2px, transparent 2px),
                                radial-gradient(circle at 95% 40%, black 2px, transparent 2px),
                                radial-gradient(circle at 60% 95%, black 2px, transparent 2px);
            
            -webkit-mask-size: 30px 30px, 28px 28px, 32px 32px, 26px 26px, 34px 34px,
                               29px 29px, 31px 31px, 27px 27px, 33px 33px, 30px 30px,
                               28px 28px, 32px 32px, 26px 26px, 35px 35px, 29px 29px,
                               30px 30px, 28px 28px, 31px 31px;
            
            -webkit-mask-repeat: repeat, repeat, repeat, repeat, repeat,
                                 repeat, repeat, repeat, repeat, repeat,
                                 repeat, repeat, repeat, repeat, repeat,
                                 repeat, repeat, repeat;
        }

        .holey-ball:active {
            cursor: grabbing;
            box-shadow: 0 0 0 2px rgba(255,255,200,0.6);
        }

        .info {
            text-align: center;
            margin-top: 28px;
            font-family: system-ui, 'Segoe UI', monospace;
            color: #bbccff;
            background: #0f1422cc;
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 14px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            pointer-events: none;
        }
        
        .note {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div>
    <div class="demo-container">
        <div class="striped-bg">
            <div id="holeyBall" class="holey-ball"></div>
        </div>
    </div>
    <div class="info">
        🔘 Круг из div с дырками через CSS mask<br>
        🖱️ Дырки — чёрные точки в маске, их много (18 слоёв с разным смещением)
        <div class="note">⚙️ Попытка №4: mask-image с точечным узором</div>
    </div>
</div>

<script>
    (function() {
        const ball = document.getElementById('holeyBall');
        let isDragging = false;
        let shiftX = 0, shiftY = 0;

        function getCoords(elem) {
            const box = elem.getBoundingClientRect();
            return {
                left: box.left + window.scrollX,
                top: box.top + window.scrollY
            };
        }

        function moveAt(pageX, pageY) {
            ball.style.left = pageX - shiftX + 'px';
            ball.style.top = pageY - shiftY + 'px';
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            moveAt(e.pageX, e.pageY);
        }

        function onMouseUp() {
            if (!isDragging) return;
            isDragging = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            ball.style.cursor = 'grab';
        }

        ball.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const coords = getCoords(ball);
            shiftX = e.pageX - coords.left;
            shiftY = e.pageY - coords.top;
            
            ball.style.position = 'absolute';
            ball.style.zIndex = '1000';
            document.body.appendChild(ball);
            moveAt(e.pageX, e.pageY);
            
            isDragging = true;
            ball.style.cursor = 'grabbing';
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        
        ball.addEventListener('dragstart', (e) => {
            e.preventDefault();
            return false;
        });
        
        window.addEventListener('load', () => {
            const parentBg = document.querySelector('.striped-bg');
            if (parentBg) {
                const parentRect = parentBg.getBoundingClientRect();
                ball.style.position = 'absolute';
                ball.style.left = (parentRect.width / 2 - ball.offsetWidth / 2) + 'px';
                ball.style.top = (parentRect.height / 2 - ball.offsetHeight / 2) + 'px';
                ball.style.zIndex = '20';
            }
        });
    })();
</script>
</body>
</html>
