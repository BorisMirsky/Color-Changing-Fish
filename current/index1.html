<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            user-select: none;
        }

        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .demo-container {
            border-radius: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            display: inline-block;
        }

        /* полосатый фон из твоего примера */
        .striped-bg {
            height: 400px;
            width: 700px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            overflow: hidden;
            background: repeating-linear-gradient(
                135deg,
                #D50000,
                #D50000 20px,
                #C51162 20px,
                #C51162 40px,
                #AA00FF 40px,
                #AA00FF 60px,
                #6200EA 60px,
                #6200EA 80px,
                #304FFE 80px,
                #304FFE 100px,
                #2962FF 100px,
                #2962FF 120px,
                #0091EA 120px,
                #0091EA 140px,
                #00B8D4 140px,
                #00B8D4 160px,
                #00BFA5 160px,
                #00BFA5 180px,
                #00C853 180px,
                #00C853 200px,
                #64DD17 200px,
                #64DD17 220px,
                #AEEA00 220px,
                #AEEA00 240px,
                #FFD600 240px,
                #FFD600 260px,
                #FFAB00 260px,
                #FFAB00 280px,
                #FF6D00 280px,
                #FF6D00 300px,
                #DD2C00 300px,
                #DD2C00 320px
            );
            position: relative;
        }

        /* КРУГ С МАЛЕНЬКИМИ И РЕДКИМИ ДЫРКАМИ — первая версия */
        .holey-ball {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            cursor: grab;
            z-index: 10;
            top: 120px;
            left: 280px;

            /* Базовый серый цвет круга */
            background-color: #DCDCDC;
            
            /* Всего ДВА слоя с дырками, чтобы фон чуть-чуть просвечивал */
            background-image: 
                /* Слой 1: дырки размером ~1.5px, шаг 28px */
                repeating-radial-gradient(
                    circle at 15% 30%,
                    transparent 0px,
                    transparent 1.5px,
                    #DCDCDC 1.5px,
                    #DCDCDC 28px
                ),
                /* Слой 2: смещённые дырки (чтобы не было строгой сетки) */
                repeating-radial-gradient(
                    circle at 70% 80%,
                    transparent 0px,
                    transparent 1.2px,
                    #DCDCDC 1.2px,
                    #DCDCDC 30px
                );
            
            /* Отключаем фоновые повторы, чтобы узор заполнил весь круг */
            background-repeat: repeat, repeat;
            background-size: auto, auto;
            
            /* Дырки смешиваются с серым фоном (прозрачные участки "прорезают" цвет) */
            background-blend-mode: normal, normal;
            
            /* Оставляем круг идеально круглым (обрезаем по форме) */
            mask: radial-gradient(circle at 50% 50%, black 100%, transparent 100%);
            -webkit-mask: radial-gradient(circle at 50% 50%, black 100%, transparent 100%);
        }

        .holey-ball:active {
            cursor: grabbing;
            box-shadow: 0 0 0 2px rgba(255,255,200,0.6);
        }

        .info {
            text-align: center;
            margin-top: 28px;
            font-family: system-ui, 'Segoe UI', monospace;
            color: #bbccff;
            background: #0f1422cc;
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 14px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            pointer-events: none;
        }
        
        .note {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div>
    <div class="demo-container">
        <div class="striped-bg">
            <img id="holeyBall" class="holey-ball" draggable="false" alt="drag me">
        </div>
    </div>
    <div class="info">
        🔘 Круг с редкими микро-дырками (1–1.5px, шаг ~28px)<br>
        🖱️ Перетащи — фон виден только сквозь крошечные точки
        <div class="note">⚙️ Попытка №1: дырки маленькие и редкие</div>
    </div>
</div>

<script>
    (function() {
        const ball = document.getElementById('holeyBall');
        let isDragging = false;
        let shiftX = 0, shiftY = 0;

        function getCoords(elem) {
            const box = elem.getBoundingClientRect();
            return {
                left: box.left + window.scrollX,
                top: box.top + window.scrollY
            };
        }

        function moveAt(pageX, pageY) {
            ball.style.left = pageX - shiftX + 'px';
            ball.style.top = pageY - shiftY + 'px';
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            moveAt(e.pageX, e.pageY);
        }

        function onMouseUp() {
            if (!isDragging) return;
            isDragging = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            ball.style.cursor = 'grab';
        }

        ball.addEventListener('mousedown', (e) => {
            e.preventDefault();
            const coords = getCoords(ball);
            shiftX = e.pageX - coords.left;
            shiftY = e.pageY - coords.top;
            
            ball.style.position = 'absolute';
            ball.style.zIndex = '1000';
            document.body.appendChild(ball);
            moveAt(e.pageX, e.pageY);
            
            isDragging = true;
            ball.style.cursor = 'grabbing';
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        
        ball.addEventListener('dragstart', (e) => {
            e.preventDefault();
            return false;
        });
        
        window.addEventListener('load', () => {
            const parentBg = document.querySelector('.striped-bg');
            if (parentBg) {
                const parentRect = parentBg.getBoundingClientRect();
                ball.style.position = 'absolute';
                ball.style.left = (parentRect.width / 2 - ball.offsetWidth / 2) + 'px';
                ball.style.top = (parentRect.height / 2 - ball.offsetHeight / 2) + 'px';
                ball.style.zIndex = '20';
            }
        });
    })();
</script>
</body>
</html>
